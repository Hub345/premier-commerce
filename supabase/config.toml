# Supabase local development config.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "premier-commerce"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

# Disabled until real Google OAuth credentials exist (see ROADMAP.md).
# To enable: set enabled = true and export SUPABASE_AUTH_GOOGLE_CLIENT_ID /
# SUPABASE_AUTH_GOOGLE_SECRET in your shell before `supabase start`.
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
